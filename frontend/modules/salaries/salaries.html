<!-- ====== SALARIES TAB ====== -->
<section id="salaries" class="tab-content">
    <div class="page-header">
        <h2 class="page-title">Mensalidade</h2>
        <button id="addSalaryBtn" class="add-new-btn">
            <i class="fa-solid fa-plus"></i> Nova receita
        </button>
    </div>

    <!-- Resumo rápido -->
    <div class="sal-summary-section">
        <div class="sal-summary-grid">

            <div class="sal-card sal-card--mensalidades">
                <div class="sal-card-inner">
                    <div class="sal-card-top">
                        <div class="sal-card-icon sal-card-icon--mensalidades">
                            <i class="fa-solid fa-credit-card"></i>
                        </div>
                        <span class="sal-card-badge sal-card-badge--mensalidades">Mensal</span>
                    </div>
                    <span class="sal-card-value" id="sumMensalidades">R$ 0,00</span>
                    <div class="sal-card-footer">
                        <span class="sal-card-label">Mensalidades</span>
                        <span class="sal-card-sub" id="sumMensalidadesCount">0 recebidas</span>
                    </div>
                </div>
                <div class="sal-card-glow sal-card-glow--mensalidades"></div>
            </div>

            <div class="sal-card sal-card--vale-churrasco">
                <div class="sal-card-inner">
                    <div class="sal-card-top">
                        <div class="sal-card-icon sal-card-icon--vale-churrasco">
                            <i class="fa-solid fa-fire-burner"></i>
                        </div>
                        <span class="sal-card-badge sal-card-badge--vale-churrasco">Evento</span>
                    </div>
                    <span class="sal-card-value" id="sumValeChurrasco">R$ 0,00</span>
                    <div class="sal-card-footer">
                        <span class="sal-card-label">Vale Churrasco</span>
                        <span class="sal-card-sub" id="sumValeChurrascoCount">0 entradas</span>
                    </div>
                </div>
                <div class="sal-card-glow sal-card-glow--vale-churrasco"></div>
            </div>

            <div class="sal-card sal-card--festivais">
                <div class="sal-card-inner">
                    <div class="sal-card-top">
                        <div class="sal-card-icon sal-card-icon--festivais">
                            <i class="fa-solid fa-trophy"></i>
                        </div>
                        <span class="sal-card-badge sal-card-badge--festivais">Festival</span>
                    </div>
                    <span class="sal-card-value" id="sumFestivais">R$ 0,00</span>
                    <div class="sal-card-footer">
                        <span class="sal-card-label">Festivais</span>
                        <span class="sal-card-sub" id="sumFestivaisCount">0 entradas</span>
                    </div>
                </div>
                <div class="sal-card-glow sal-card-glow--festivais"></div>
            </div>

            <div class="sal-card sal-card--patrocinios">
                <div class="sal-card-inner">
                    <div class="sal-card-top">
                        <div class="sal-card-icon sal-card-icon--patrocinios">
                            <i class="fa-solid fa-handshake"></i>
                        </div>
                        <span class="sal-card-badge sal-card-badge--patrocinios">Parceria</span>
                    </div>
                    <span class="sal-card-value" id="sumPatrocinios">R$ 0,00</span>
                    <div class="sal-card-footer">
                        <span class="sal-card-label">Patrocínios</span>
                        <span class="sal-card-sub" id="sumPatrociniosCount">0 entradas</span>
                    </div>
                </div>
                <div class="sal-card-glow sal-card-glow--patrocinios"></div>
            </div>

        </div>

        <!-- Total do mês -->
        <div class="sal-total-bar">
            <div class="sal-total-left">
                <div class="sal-total-icon"><i class="fa-solid fa-wallet"></i></div>
                <div>
                    <p class="sal-total-label">Total do mês</p>
                    <p class="sal-total-sub" id="sumOtherCount"></p>
                </div>
            </div>
            <span class="sal-total-value" id="sumTotal">R$ 0,00</span>
        </div>
    </div>

    <!-- Modal Nova Receita -->
    <div id="salaryModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-coins"></i> Nova Receita</h3>
                <button class="close modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="salaryForm">
                <!-- Tipo -->
                <div class="form-group">
                    <label>Tipo</label>
                    <div class="salary-type-toggle">
                        <button type="button" class="salary-type-btn active" data-type="mensalidade" id="btnMensalidade">
                            <i class="fa-solid fa-credit-card"></i> Mensalidade
                        </button>
                        <button type="button" class="salary-type-btn salary-type-btn--churrasco" data-type="vale_churrasco" id="btnValeChurrasco">
                            <i class="fa-solid fa-fire-burner"></i> Vale Churrasco
                        </button>
                        <button type="button" class="salary-type-btn salary-type-btn--festival" data-type="festivais" id="btnFestivais">
                            <i class="fa-solid fa-trophy"></i> Festivais
                        </button>
                        <button type="button" class="salary-type-btn salary-type-btn--patrocinio" data-type="patrocinio" id="btnPatrocinio">
                            <i class="fa-solid fa-handshake"></i> Patrocínio
                        </button>
                    </div>
                    <input type="hidden" id="salaryType" value="mensalidade">
                </div>

                <!-- Jogador (só para mensalidade) -->
                <div class="form-group" id="playerGroup">
                    <label for="salaryPersonDisplay">Jogador</label>
                    <input type="text" id="salaryPersonDisplay" readonly style="opacity:0.7;cursor:not-allowed;">
                    <input type="hidden" id="salaryPerson">
                </div>

                <!-- Patrocinador / Origem (para patrocínio e outro) -->
                <div class="form-group" id="sponsorGroup" style="display:none;">
                    <label for="sponsorName">Patrocinador / Origem</label>
                    <input type="text" id="sponsorName" placeholder="Ex: Nike, Prefeitura...">
                </div>

                <div class="form-group" id="amountGroup">
                    <label for="salaryAmount">Valor (R$)</label>
                    <input type="number" id="salaryAmount" placeholder="0,00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="salaryDate">Data</label>
                    <input type="date" id="salaryDate" required>
                </div>

                <button type="submit" class="btn-primary">
                    <i class="fa-solid fa-check"></i> Registrar
                </button>
            </form>
        </div>
    </div>

    <!-- Histórico -->
    <div class="list-section">
        <div class="list-section-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
            <h3>Histórico de Mensalidades</h3>
            <div class="salary-month-filter">
                <select id="salaryMonthFilter" class="salary-month-select">
                    <!-- Populated by JS -->
                </select>
            </div>
        </div>
        <div id="salaryHistoryList" class="transactions-list"></div>
    </div>
</section>
