<!-- ====== CHORES / TAREFAS TAB ====== --> <!-- Aba de tarefas do time Sky FC -->
<section id="chores" class="tab-content">
    <div class="page-header">
        <h2 class="page-title"><i class="fa-solid fa-shirt" style="color:var(--primary)"></i> Tarefas do Time</h2>
        <div class="page-header-actions">
            <button id="editChoresToggle" class="ph-icon-btn" title="Editar tarefas">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>
    </div>

    <!-- Day Selector -->
    <div class="chores-day-strip">
        <div class="chores-day-scroller" id="choresDayScroller"></div>
    </div>

    <!-- Progress Dashboard -->
    <div class="chores-dashboard">
        <div class="chores-progress-ring-wrap">
            <svg class="chores-progress-ring" viewBox="0 0 120 120">
                <circle class="ring-bg" cx="60" cy="60" r="52" />
                <circle class="ring-fill" id="choresRingFill" cx="60" cy="60" r="52" />
            </svg>
            <div class="chores-ring-label">
                <span class="ring-pct" id="choresRingPct">0%</span>
                <span class="ring-sub">concluído</span>
            </div>
        </div>
        <div class="chores-stats-grid">
            <div class="chore-stat-card">
                <div class="csc-icon" style="background:rgba(58,134,255,0.15)"><i class="fa-solid fa-list-check" style="color:#3a86ff"></i></div>
                <div class="csc-info">
                    <span class="csc-val" id="choresLuanCount">0/0</span>
                    <span class="csc-label">Pré-Jogo</span>
                </div>
            </div>
            <div class="chore-stat-card">
                <div class="csc-icon" style="background:rgba(247,37,133,0.15)"><i class="fa-solid fa-list-check" style="color:var(--primary)"></i></div>
                <div class="csc-info">
                    <span class="csc-val" id="choresBiancaCount">0/0</span>
                    <span class="csc-label">Pós-Jogo</span>
                </div>
            </div>
            <div class="chore-stat-card">
                <div class="csc-icon" style="background:rgba(6,214,160,0.15)"><i class="fa-solid fa-circle-check" style="color:var(--success)"></i></div>
                <div class="csc-info">
                    <span class="csc-val" id="choresTotalDone">0</span>
                    <span class="csc-label">Feitas</span>
                </div>
            </div>
            <div class="chore-stat-card">
                <div class="csc-icon" style="background:rgba(248,150,30,0.15)"><i class="fa-solid fa-clock" style="color:var(--warning)"></i></div>
                <div class="csc-info">
                    <span class="csc-val" id="choresTotalPending">0</span>
                    <span class="csc-label">Pendentes</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Pré-Treino Tasks -->
    <div class="chores-person-section">
        <div class="chores-person-bar chores-luan-bar">
            <div class="cpb-left">
                <div class="cpb-avatar luan-avatar" style="background:rgba(58,134,255,0.15);display:flex;align-items:center;justify-content:center;border-radius:50%"><i class="fa-solid fa-futbol" style="color:#3a86ff;font-size:1.2rem"></i></div>
                <span class="cpb-name">Pré-Jogo</span>
            </div>
            <span class="cpb-badge" id="choresLuanBadge">0/0</span>
        </div>
        <ul id="choresLuanList" class="chores-task-list"></ul>
        <div class="chores-add-row" id="choresAddLuan" style="display:none">
            <input type="text" class="chores-add-input" id="choresNewLuan" placeholder="Nova tarefa...">
            <button class="chores-add-btn" id="choresAddLuanBtn"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- Pós-Treino Tasks -->
    <div class="chores-person-section">
        <div class="chores-person-bar chores-bianca-bar">
            <div class="cpb-left">
                <div class="cpb-avatar bianca-avatar" style="background:rgba(247,37,133,0.15);display:flex;align-items:center;justify-content:center;border-radius:50%"><i class="fa-solid fa-shirt" style="color:var(--primary);font-size:1.2rem"></i></div>
                <span class="cpb-name">Pós-Jogo</span>
            </div>
            <span class="cpb-badge" id="choresBiancaBadge">0/0</span>
        </div>
        <div id="choresResponsibleCard" class="chores-responsible-wrap"></div>
        <ul id="choresBiancaList" class="chores-task-list"></ul>
        <div class="chores-add-row" id="choresAddBianca" style="display:none">
            <input type="text" class="chores-add-input" id="choresNewBianca" placeholder="Nova tarefa...">
            <button class="chores-add-btn" id="choresAddBiancaBtn"><i class="fa-solid fa-plus"></i></button>
        </div>
    </div>

    <!-- Edit Chores Modal -->
    <div id="editChoreModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fa-solid fa-pen"></i> Editar Tarefa</h3>
                <button class="close modal-close-btn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <form id="editChoreForm">
                <div class="form-group">
                    <label for="editChoreText">Tarefa</label>
                    <input type="text" id="editChoreText" required>
                </div>
                <input type="hidden" id="editChorePerson">
                <input type="hidden" id="editChoreIndex">
                <input type="hidden" id="editChoreDay">
                <button type="submit" class="form-submit-btn"><i class="fa-solid fa-check"></i> Salvar</button>
            </form>
        </div>
    </div>
</section>
